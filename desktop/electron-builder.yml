appId: com.multidrop.lolmodobanheiro
productName: LoL Modo Banheiro
directories:
  output: release
# Auto-update via GitHub Releases (repo público). O build gera o latest.yml que o
# electron-updater lê; publique .exe + latest.yml + .exe.blockmap na Release.
publish:
  provider: github
  owner: AthosAlexandre
  repo: controlar-lol
files:
  - build/**/*
  - package.json
extraResources:
  - from: ../server/dist/server.bundle.js
    to: server/dist/server.bundle.js
  - from: ../web/dist
    to: web/dist
# Gera o instalador .exe (NSIS). App não assinado (signAndEditExecutable:false),
# então o Windows mostra o aviso de "app desconhecido" na 1ª execução — normal.
# Obs.: o winCodeSign do electron-builder falha ao extrair no Windows sem
# privilégio de symlink; o build-all.ps1 pré-popula o cache dele antes de buildar.
win:
  target: nsis
  signAndEditExecutable: false
# Nome do instalador SEM espaços, para bater exatamente com a url do latest.yml
# (o auto-update por upload manual precisa que o nome do arquivo == url do manifesto).
artifactName: LoL-Modo-Banheiro-Setup-${version}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: LoL Modo Banheiro
